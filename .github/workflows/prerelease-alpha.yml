name: Build Alpha and Update Latest Pre-release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "24"

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Build alpha
      - name: Build alpha
        run: npm run build:alpha

      # Get version from system.json
      - name: Get version from system.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./dist/system.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # Set tag for latest alpha
      - name: Set release tag
        run: |
          ALPHA_TAG="${VERSION}-alpha"
          echo "ALPHA_TAG=$ALPHA_TAG" >> $GITHUB_ENV

      # Update system.json with latest release URLs
      - name: Update system.json
        run: |
          SYSTEM_JSON="dist/system.json"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${ALPHA_TAG}/dist.zip"

          node -e "
            const fs = require('fs');
            const json = JSON.parse(fs.readFileSync('$SYSTEM_JSON', 'utf-8'));
            json.manifest = '$RELEASE_URL';
            json.download = '$RELEASE_URL';
            fs.writeFileSync('$SYSTEM_JSON', JSON.stringify(json, null, 2));
          "

      # Delete existing prerelease with same tag
      - name: Delete existing prerelease
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const tag = process.env.ALPHA_TAG;
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const existing = releases.data.find(r => r.tag_name === tag);
            if (existing) {
              console.log(`Deleting existing release: ${tag}`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.id
              });
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`
              });
            }

      - name: Zip dist folder
        run: |
          ZIP_FILE="dist.zip"
          cd dist
          zip -r "../$ZIP_FILE" .
          cd ..

      # 9:Create prerelease
      - name: Create latest alpha prerelease
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.ALPHA_TAG }}
          name: Latest Alpha Build
          body: Automatic latest alpha build based on version ${{ env.VERSION }}
          prerelease: true
          draft: false
          artifacts: dist.zip
          token: ${{ secrets.PAT_TOKEN }}

      # 10: Optional log
      - name: Done
        run: echo "✅ Latest alpha prerelease created/updated successfully."
